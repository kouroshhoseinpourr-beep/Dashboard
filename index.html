<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>گزارش عملکرد سفیران — الوپیک و الوپیک پلاس</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800;900&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg: #f0f4fb;
      --panel: #ffffff;
      --panel-2: #f7f9fd;
      --panel-3: #edf0f7;
      --border: #dde2ee;
      --border-soft: #e8ecf5;
      --text: #1a2035;
      --text-dim: #5a6480;
      --text-faint: #9aa3bb;

      --blue: #0099ff;
      --blue-deep: #0099ff;
      --blue-glow: rgba(37, 99, 235, .12);
      --blue-line: rgba(37, 99, 235, .35);

      --yellow: #ffb510;
      --yellow-deep: #ffb510;
      --yellow-glow: rgba(251, 191, 36, .13);
      --yellow-line: rgba(251, 191, 36, .45);

      --purple: #7c3aed;
      --purple-glow: rgba(124, 58, 237, .10);
      --green: #059669;
      --green-glow: rgba(5, 150, 105, .10);
      --red: #dc2626;

      --r-sm: 8px;
      --r-md: 14px;
      --r-lg: 20px;
      --sans: 'Vazirmatn', sans-serif;

      --pin-bg: #eff6ff;
      --pin-border: #bfdbfe;
      --pin-text: #1e40af;

      --shadow-sm: 0 2px 8px rgba(0, 0, 0, .06);
      --shadow-md: 0 4px 20px rgba(0, 0, 0, .09);
      --shadow-lg: 0 8px 32px rgba(0, 0, 0, .12);

      --header-h: 88px;
      --header-h-compact: 64px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
    }

    body {
      background:
        radial-gradient(ellipse at 5% -5%, rgba(37, 99, 235, .08), transparent 45%),
        radial-gradient(ellipse at 97% 3%, rgba(251, 191, 36, .10), transparent 40%),
        radial-gradient(ellipse at 50% 100%, rgba(124, 58, 237, .04), transparent 60%),
        var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 16px;
      direction: rtl;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ══════════════════════════════════════
       STICKY HEADER
    ══════════════════════════════════════ */
    .sticky-header {
      position: sticky;
      top: 0;
      z-index: 999;
      width: 100%;
      animation: headerSlideDown .55s cubic-bezier(.22, 1, .36, 1) both;
    }

    @keyframes headerSlideDown {
      from {
        transform: translateY(-110%);
        opacity: 0;
      }

      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .sticky-header-inner {
      background: rgba(240, 244, 251, 0.72);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border-bottom: 1.5px solid rgba(221, 226, 238, 0.6);
      transition: box-shadow .35s cubic-bezier(.4, 0, .2, 1),
        background .35s ease,
        border-color .35s ease;
      position: relative;
      overflow: hidden;
    }

    .sticky-header-inner::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg,
          transparent 0%, var(--blue) 30%, var(--blue-deep) 50%, var(--blue) 70%, transparent 100%);
      background-size: 200% 100%;
      animation: shimmerLine 3s ease-in-out infinite;
    }

    .theme-plus .sticky-header-inner::before {
      background: linear-gradient(90deg,
          transparent 0%, var(--yellow) 30%, var(--yellow-deep) 50%, var(--yellow) 70%, transparent 100%);
      background-size: 200% 100%;
    }

    @keyframes shimmerLine {
      0% {
        background-position: 200% 0;
      }

      100% {
        background-position: -200% 0;
      }
    }

    .sticky-header.scrolled .sticky-header-inner {
      background: rgba(240, 244, 251, 0.95);
      box-shadow: 0 4px 24px rgba(37, 99, 235, .10), 0 1px 0 rgba(255, 255, 255, .8) inset;
      border-bottom-color: rgba(221, 226, 238, 0.9);
    }

    .theme-plus .sticky-header.scrolled .sticky-header-inner {
      box-shadow: 0 4px 24px rgba(251, 191, 36, .14), 0 1px 0 rgba(255, 255, 255, .8) inset;
    }

    .header-content {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
      height: var(--header-h);
      transition: height .35s cubic-bezier(.4, 0, .2, 1);
    }

    .scrolled .header-content {
      height: var(--header-h-compact);
    }

    .header-left {
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 4px;
      min-width: 0;
    }

    .header-eyebrow {
      font-size: 12px;
      letter-spacing: .06em;
      color: var(--text-faint);
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 700;
      overflow: hidden;
      max-height: 22px;
      opacity: 1;
      transition: max-height .35s cubic-bezier(.4, 0, .2, 1), opacity .25s ease, margin .35s ease;
    }

    .scrolled .header-eyebrow {
      max-height: 0;
      opacity: 0;
      margin-bottom: -4px;
    }

    .header-eyebrow .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 0 3px rgba(5, 150, 105, .2);
      flex-shrink: 0;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        box-shadow: 0 0 0 3px rgba(5, 150, 105, .2);
      }

      50% {
        box-shadow: 0 0 0 7px rgba(5, 150, 105, .06);
      }
    }

    .header-title {
      font-size: 26px;
      font-weight: 900;
      margin: 0;
      letter-spacing: -.025em;
      line-height: 1.1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: font-size .35s cubic-bezier(.4, 0, .2, 1), color .35s ease;
    }

    /* ── تایتل داینامیک ── */
    .theme-alo .header-title {
      color: var(--text-dim);
    }

    .theme-plus .header-title {
      color: var(--text-dim);
    }

    .scrolled .header-title {
      font-size: 20px;
    }

    /* ── switch ── */
    .switch {
      display: flex;
      background: var(--panel-2);
      border: 2px solid var(--border);
      border-radius: 999px;
      padding: 5px;
      gap: 4px;
      position: relative;
      width: max-content;
      box-shadow: var(--shadow-sm);
      flex-shrink: 0;
      transition: transform .35s cubic-bezier(.4, 0, .2, 1);
    }

    .scrolled .switch {
      transform: scale(0.9);
    }

    .switch button {
      position: relative;
      z-index: 2;
      border: none;
      background: none;
      font-family: var(--sans);
      font-weight: 800;
      font-size: 15px;
      padding: 11px 28px;
      border-radius: 999px;
      cursor: pointer;
      transition: color .3s ease;
      white-space: nowrap;
    }

    /* دکمه‌های غیرفعال */
    .switch button:not(.active) {
      color: var(--text-dim);
    }

    /* دکمه الوپیک پلاس وقتی سوییچ روی پلاسه → سفید */
    .switch.is-plus #btnPlus:not(.active) {
      color: rgba(255, 255, 255, 0.85);
    }

    /* دکمه الوپیک وقتی سوییچ روی الوپیکه → سفید */
    .switch:not(.is-plus) #btnAlo:not(.active) {
      color: rgba(255, 255, 255, 0.85);
    }

    .switch button.active {
      color: #fff;
    }

    /* دکمه الوپیک پلاس غیرفعال (وقتی الوپیک انتخابه) */
    .switch:not(.is-plus) #btnPlus {
      color: var(--text-dim);
    }

    .switch.pill {
      position: absolute;
      top: 5px;
      bottom: 5px;
      right: 5px;
      width: calc(50% - 5px);
      border-radius: 999px;
      z-index: 1;
      background: linear-gradient(135deg, var(--blue), var(--blue-deep));
      transition: transform .38s cubic-bezier(.65, 0, .35, 1), background .35s ease;
      box-shadow: 0 4px 18px -2px rgba(37, 99, 235, .45);
    }

    .switch .pill {
      position: absolute;
      top: 5px;
      bottom: 5px;
      right: 5px;
      width: calc(50% - 5px);
      border-radius: 999px;
      z-index: 1;
      background: linear-gradient(135deg, var(--blue), var(--blue-deep));
      transition: transform .38s cubic-bezier(.65, 0, .35, 1), background .35s ease;
      box-shadow: 0 4px 18px -2px rgba(37, 99, 235, .45);
    }

    .switch.is-plus .pill {
      transform: translateX(-100%);
      background: linear-gradient(135deg, var(--yellow), var(--yellow-deep));
      box-shadow: 0 4px 18px -2px rgba(251, 191, 36, .50);
    }

    /* ══════════════════════════════════════
       LAYOUT
    ══════════════════════════════════════ */
    .wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 28px 24px 100px;
    }

    .subnav {
      display: flex;
      gap: 10px;
      margin: 0 0 24px;
      flex-wrap: wrap;
    }

    .subnav button {
      font-family: var(--sans);
      font-weight: 800;
      font-size: 16px;
      color: var(--text-dim);
      background: var(--panel);
      border: 2px solid var(--border);
      padding: 13px 26px;
      border-radius: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all .22s cubic-bezier(.4, 0, .2, 1);
      box-shadow: var(--shadow-sm);
    }

    .subnav button:hover {
      color: var(--text);
      border-color: var(--blue-line);
      background: var(--blue-glow);
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
    }

    .subnav button.active {
      color: #fff;
      border-color: transparent;
      box-shadow: 0 4px 14px rgba(0, 0, 0, .15);
      transform: translateY(-1px);
    }

    .theme-alo .subnav button.active {
      background: linear-gradient(135deg, var(--blue), var(--blue-deep));
    }

    .theme-plus .subnav button.active {
      background: linear-gradient(135deg, var(--yellow), var(--yellow-deep));
      color: #fff;
    }

    /* ── panels ── */
    .panel {
      background: var(--panel);
      border: 1.5px solid var(--border);
      border-radius: var(--r-lg);
      padding: 28px;
      box-shadow: var(--shadow-sm);
      transition: box-shadow .25s ease;
    }

    .panel:hover {
      box-shadow: var(--shadow-md);
    }

    .panel+.panel {
      margin-top: 18px;
    }

    .panel-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 22px;
      flex-wrap: wrap;
    }

    .panel-head h3 {
      font-size: 22px;
      margin: 0 0 6px;
      font-weight: 900;
      color: var(--text);
      letter-spacing: -.02em;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .panel-head p {
      margin: 0;
      font-size: 15px;
      color: var(--text-dim);
      line-height: 1.6;
    }

    .tag {
      font-size: 13px;
      padding: 6px 14px;
      border-radius: 8px;
      border: 1.5px solid var(--border);
      color: var(--text-dim);
      white-space: nowrap;
      background: var(--panel-2);
      font-weight: 700;
    }

    /* ── table ── */
    .tbl-scroll {
      overflow-x: auto;
      border-radius: var(--r-md);
      border: 1.5px solid var(--border-soft);
    }

    table.data {
      width: 100%;
      border-collapse: collapse;
      font-size: 15px;
      min-width: 480px;
    }

    table.data th {
      font-family: var(--sans);
      font-weight: 800;
      color: var(--text-dim);
      font-size: 14px;
      text-align: right;
      padding: 16px 18px;
      background: var(--panel-2);
      border-bottom: 2px solid var(--border);
      position: sticky;
      top: 0;
      white-space: nowrap;
    }

    table.data td {
      padding: 14px 18px;
      border-bottom: 1px solid var(--border-soft);
      font-family: var(--sans);
      font-size: 15px;
      white-space: nowrap;
      color: var(--text);
      font-weight: 600;
    }

    table.data td.city {
      font-weight: 800;
      font-size: 16px;
    }

    table.data tbody tr {
      transition: background .15s ease;
    }

    table.data tbody tr:hover {
      background: var(--panel-2);
    }

    table.data tbody tr:last-child td {
      border-bottom: none;
    }

    table.data tbody tr.pinned-row {
      background: var(--pin-bg) !important;
    }

    table.data tbody tr.pinned-row td {
      border-bottom: 1px solid var(--pin-border);
    }

    table.data tbody tr.pinned-row td.city {
      color: var(--pin-text);
      font-weight: 900;
    }

    table.data tbody tr.pinned-row td.city::after {
      content: " ★";
      font-size: 12px;
      color: var(--blue);
      opacity: .8;
    }

    .theme-plus table.data tbody tr.pinned-row {
      background: #fffbeb !important;
    }

    .theme-plus table.data tbody tr.pinned-row td {
      border-bottom-color: #fde68a;
    }

    .theme-plus table.data tbody tr.pinned-row td.city {
      color: #78350f;
    }

    .theme-plus table.data tbody tr.pinned-row td.city::after {
      color: var(--yellow-deep);
    }

    .biker-card.pinned {
      border: 2px solid var(--pin-border);
      background: var(--pin-bg);
    }

    .theme-plus .biker-card.pinned {
      border-color: #fcd34d;
      background: #fffbeb;
    }

    .dash {
      color: var(--text-faint);
    }

    .num-pos {
      color: var(--green);
      font-weight: 700;
    }

    .num-neg {
      color: var(--red);
      font-weight: 700;
    }

    /* ── biker cards ── */
    .biker-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
      gap: 14px;
    }

    .biker-card {
      background: var(--panel-2);
      border: 1.5px solid var(--border);
      border-radius: var(--r-md);
      padding: 20px;
      transition: all .25s cubic-bezier(.4, 0, .2, 1);
      animation: slideUp .4s ease both;
    }

    .biker-card:hover {
      box-shadow: var(--shadow-md);
      transform: translateY(-3px);
      border-color: var(--blue-line);
    }

    .theme-plus .biker-card:hover {
      border-color: var(--yellow-line);
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(16px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .biker-card:nth-child(1) {
      animation-delay: .05s
    }

    .biker-card:nth-child(2) {
      animation-delay: .10s
    }

    .biker-card:nth-child(3) {
      animation-delay: .15s
    }

    .biker-card:nth-child(4) {
      animation-delay: .20s
    }

    .biker-card:nth-child(5) {
      animation-delay: .25s
    }

    .biker-card:nth-child(6) {
      animation-delay: .30s
    }

    .biker-card .city {
      font-weight: 900;
      font-size: 18px;
      margin-bottom: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: var(--text);
      padding-bottom: 12px;
      border-bottom: 1.5px solid var(--border-soft);
    }

    .biker-card .metric {
      margin-bottom: 14px;
    }

    .biker-card .metric:last-child {
      margin-bottom: 0;
    }

    .metric-label {
      font-size: 14px;
      color: var(--text-dim);
      display: flex;
      justify-content: space-between;
      margin-bottom: 7px;
      font-weight: 700;
      align-items: center;
    }

    .metric-label .delta {
      font-weight: 800;
      font-size: 14px;
    }

    .bar-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .bar-track {
      flex: 1;
      height: 8px;
      border-radius: 6px;
      background: var(--panel-3);
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      border-radius: 6px;
      transition: width .6s cubic-bezier(.4, 0, .2, 1);
    }

    .bar-fill.now {
      background: linear-gradient(90deg, var(--blue), var(--blue-deep));
    }

    .bar-fill.prev {
      background: var(--text-faint);
      opacity: .35;
    }

    .theme-plus .bar-fill.now {
      background: linear-gradient(90deg, var(--yellow), var(--yellow-deep));
    }

    .bar-val {
      font-size: 14px;
      font-weight: 700;
      color: var(--text-dim);
      width: 76px;
      text-align: left;
      flex-shrink: 0;
    }

    .legend-row {
      display: flex;
      gap: 20px;
      align-items: center;
      margin-bottom: 20px;
      font-size: 14px;
      color: var(--text-dim);
      font-weight: 700;
      padding: 12px 16px;
      background: var(--panel-2);
      border-radius: 10px;
      border: 1.5px solid var(--border-soft);
    }

    .legend-row .sw {
      width: 14px;
      height: 14px;
      border-radius: 4px;
      display: inline-block;
      margin-left: 6px;
    }

    /* ── datebar & accordion ── */
    .datebar {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .datebtn {
      font-family: var(--sans);
      font-size: 15px;
      font-weight: 800;
      color: var(--text-dim);
      background: var(--panel-2);
      border: 2px solid var(--border);
      padding: 12px 24px;
      border-radius: 10px;
      cursor: pointer;
      transition: all .22s ease;
    }

    .datebtn:hover {
      color: var(--text);
      transform: translateY(-2px);
      box-shadow: var(--shadow-sm);
    }

    .datebtn.active {
      color: #fff;
      border-color: transparent;
      transform: translateY(-1px);
    }

    .theme-alo .datebtn.active {
      background: var(--blue);
      box-shadow: 0 4px 12px rgba(37, 99, 235, .35);
    }

    .theme-plus .datebtn.active {
      background: var(--yellow);
      box-shadow: 0 4px 12px rgba(251, 191, 36, .40);
      color: #78350f;
    }

    .accordion {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .acc-item {
      border: 1.5px solid var(--border);
      border-radius: var(--r-md);
      overflow: hidden;
      background: var(--panel-2);
      transition: box-shadow .25s ease, border-color .25s ease;
    }

    .acc-item:hover {
      box-shadow: var(--shadow-sm);
    }

    .acc-item.open {
      border-color: var(--blue-line);
      box-shadow: var(--shadow-md);
    }

    .theme-plus .acc-item.open {
      border-color: var(--yellow-line);
    }

    .acc-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 22px;
      cursor: pointer;
      user-select: none;
      transition: background .18s ease;
    }

    .acc-head:hover {
      background: var(--panel-3);
    }

    .acc-head .left {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .seg-chip {
      font-size: 13px;
      font-weight: 800;
      padding: 6px 14px;
      border-radius: 8px;
    }

    .acc-head .gloss {
      font-size: 15px;
      color: var(--text-dim);
      font-weight: 700;
    }

    .acc-head .meta {
      font-size: 14px;
      color: var(--text-faint);
      font-weight: 600;
    }

    .acc-head .chev {
      transition: transform .3s cubic-bezier(.4, 0, .2, 1);
      color: var(--text-faint);
      font-size: 18px;
    }

    .acc-item.open .chev {
      transform: rotate(180deg);
    }

    .acc-body {
      max-height: 0;
      overflow: hidden;
      transition: max-height .38s cubic-bezier(.4, 0, .2, 1);
    }

    .acc-body-inner {
      padding: 0 22px 20px;
    }

    .seg-dormant {
      background: rgba(37, 99, 235, .12);
      color: #1d4ed8;
    }

    .seg-churn {
      background: rgba(251, 191, 36, .15);
      color: #92400e;
    }

    .seg-deactive {
      background: rgba(220, 38, 38, .12);
      color: #b91c1c;
    }

    .seg-recency {
      background: rgba(5, 150, 105, .12);
      color: #047857;
    }

    /* ── acttype ── */
    .acttype {
      display: flex;
      gap: 12px;
      margin-bottom: 22px;
    }

    .acttype button {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 6px;
      border: 2px solid var(--border);
      background: var(--panel-2);
      border-radius: var(--r-md);
      padding: 18px 22px;
      cursor: pointer;
      transition: all .25s cubic-bezier(.4, 0, .2, 1);
      box-shadow: var(--shadow-sm);
    }

    .acttype button .t1 {
      font-weight: 900;
      font-size: 18px;
      color: var(--text);
    }

    .acttype button .t2 {
      font-size: 14px;
      color: var(--text-dim);
      font-weight: 600;
    }

    .acttype button:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow-md);
    }

    .acttype button.active.daily {
      border-color: rgba(124, 58, 237, .5);
      background: var(--purple-glow);
      box-shadow: 0 4px 16px rgba(124, 58, 237, .15);
    }

    .acttype button.active.timeslot {
      border-color: rgba(5, 150, 105, .5);
      background: var(--green-glow);
      box-shadow: 0 4px 16px rgba(5, 150, 105, .15);
    }

    .split-tables {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    @media(max-width:760px) {
      .split-tables {
        grid-template-columns: 1fr;
      }
    }

    .split-head {
      font-size: 15px;
      font-weight: 900;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .split-head .sw {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }

    .empty-state {
      border: 2px dashed var(--border);
      border-radius: var(--r-md);
      padding: 36px 16px;
      text-align: center;
      color: var(--text-faint);
      font-size: 15px;
      font-weight: 600;
    }

    /* ── growth cards ── */
    .growth-summary {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 14px;
      margin-bottom: 6px;
    }

    .growth-card {
      background: var(--panel-2);
      border: 1.5px solid var(--border);
      border-radius: var(--r-md);
      padding: 22px 18px 18px;
      display: flex;
      flex-direction: column;
      gap: 5px;
      position: relative;
      overflow: hidden;
      transition: all .28s cubic-bezier(.4, 0, .2, 1);
      animation: slideUp .45s ease both;
    }

    .growth-card:hover {
      box-shadow: var(--shadow-md);
      transform: translateY(-4px);
    }

    .growth-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--blue), var(--blue-deep));
      border-radius: 3px 3px 0 0;
    }

    .theme-plus .growth-card::before {
      background: linear-gradient(90deg, var(--yellow), var(--yellow-deep));
    }

    .growth-card::after {
      content: '';
      position: absolute;
      bottom: -30px;
      right: -20px;
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--blue), var(--blue-deep));
      opacity: .04;
    }

    .theme-plus .growth-card::after {
      background: linear-gradient(135deg, var(--yellow), var(--yellow-deep));
    }

    .growth-icon {
      font-size: 24px;
      margin-bottom: 4px;
      line-height: 1;
    }

    .growth-label {
      font-size: 14px;
      color: var(--text-dim);
      font-weight: 800;
    }

    .growth-delta {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 15px;
      font-weight: 800;
      padding: 5px 12px;
      border-radius: 20px;
      width: fit-content;
      margin-bottom: 2px;
    }

    .growth-delta.pos {
      background: rgba(5, 150, 105, .12);
      color: #047857;
    }

    .growth-delta.neg {
      background: rgba(220, 38, 38, .10);
      color: #b91c1c;
    }

    .growth-arrow {
      font-size: 12px;
    }

    .growth-now {
      font-size: 30px;
      font-weight: 900;
      color: var(--text);
      line-height: 1.1;
      margin: 2px 0 4px;
      letter-spacing: -.02em;
    }

    .growth-prev {
      font-size: 13px;
      color: var(--text-faint);
      font-weight: 600;
    }

    .fade-in {
      animation: fadeIn .4s cubic-bezier(.4, 0, .2, 1) both;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(8px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

       FOOTER
    ══════════════════════════════════════ */
    footer.foot {
      margin-top: 56px;

      overflow: hidden;
      transition: background .4s ease, box-shadow .4s ease;
    }

    footer.foot::before {
      content: '';
      position: absolute;
      top: -40px;
      left: -40px;
      width: 160px;
      height: 160px;
      border-radius: 50%;
      background: rgba(255, 255, 255, .06);
    }

    footer.foot::after {
      content: '';
      position: absolute;
      bottom: -60px;
      right: -20px;
      width: 200px;
      height: 200px;
      border-radius: 50%;
      background: rgba(255, 255, 255, .04);
    }

    .theme-plus footer.foot {

      font-weight: 900;
      font-size: 17px;
      color: #fff;

      align-items: center;
      gap: 12px;
      position: relative;
      z-index: 1;
    }

    .foot-brand .badge {

      border-radius: 8px;
      padding: 4px 12px;

      const metrics = [

              <div class="growth-label">${m.label}</div>

              <div class="growth-now">${nowFmt}</div>
              <div class="growth-prev">میانگین هفته: ${prFmt}</div>
            </div>`;
      }).join('')}

      <div class="panel">
        <div class="panel-head">
          <div><h3>فعالسازی سفیران بر اساس سگمنت</h3><p>روی هر سگمنت کلیک کنید تا اطلاعات شهرهای آن باز شود</p></div>
          <span class="tag">جمع کل هزینه: ${cell(segTotal)} تومان</span>
        </div>
        <div class="datebar">
          ${dates.map(d => `<button class="datebtn ${d === cur ? 'active' : ''}" data-react-date="${d}">${DATE_LABEL[d]}</button>`).join('')}
        </div>
        <div class="accordion">
          ${Object.keys(data[cur]).map(seg => renderAccordion(company, cur, seg, data[cur][seg])).join('')}
        </div>
      </div>`;
    }

    function renderAccordion(company, date, seg, rawRows) {
      const rows = pinSort(rawRows);
      const meta = SEG_META[seg] || { cls: 'seg-dormant', gloss: '' };
      const key = `${company}-${date}-${seg}`;
      const isOpen = !!openSeg[key];
      const tC = rows.reduce((a, r) => a + (r.cohort || 0), 0);
      const tE = rows.reduce((a, r) => a + (r.enroll || 0), 0);
      const tCost = sumCost(rows);
      return `
      <div class="acc-item ${isOpen ? 'open' : ''}" data-seg-key="${key}">
        <div class="acc-head" data-seg-toggle="${key}">
          <div class="left"><span class="seg-chip ${meta.cls}">${seg}</span><span class="gloss">${meta.gloss}</span></div>
          <div style="display:flex;align-items:center;gap:16px">
            <span class="meta">${toFa(rows.length)} شهر · cohort ${fmt(tC)} · enroll ${fmt(tE)} · هزینه کل ${fmt(tCost)} تومان</span>
            <span class="chev">▾</span>
          </div>
        </div>
        <div class="acc-body" style="max-height:${isOpen ? '700px' : '0'}">
          <div class="acc-body-inner">
            <div class="tbl-scroll"><table class="data">
              <thead><tr><th>شهر</th><th>Cohort Size</th><th>Enroll Size</th><th>Cost</th><th>CPA (تومان)</th></tr></thead>
              <tbody>
                ${rows.map(r => `
                  <tr class="${PINNED.includes(r.city) ? 'pinned-row' : ''}">
                    <td class="city">${r.city}</td>
                    <td>${cell(r.cohort)}</td><td>${cell(r.enroll)}</td>
                    <td>${cell(r.cost)}</td><td>${cell(r.cpa, 0)}</td>
                  </tr>`).join('')}
              </tbody>
              <tfoot><tr style="background:var(--panel-2)">
                <td class="city" style="font-weight:900">جمع کل</td>
                <td style="font-weight:800">${cell(tC)}</td>
                <td style="font-weight:800">${cell(tE)}</td>
                <td style="font-weight:800">${cell(tCost)}</td>
                <td></td>
              </tr></tfoot>
            </table></div>
          </div>
        </div>
      </div>`;
    }

    /* ── act plus ── */
    function renderActPlus() {
      const act = DATA.plus.act;
      const sub = actSub.plus;
      return `
      <div class="panel">
        <div class="panel-head"><div><h3>نگهداشت سفیران — الوپیک پلاس</h3></div></div>
        <div class="acttype">
          <button class="daily ${sub === 'daily' ? 'active' : ''}" data-act-sub="daily">
            <span class="t1">📅 روزانه</span><span class="t2">۲۸ خرداد · کمپین روزانه</span>
          </button>
          <button class="timeslot ${sub === 'timeslot' ? 'active' : ''}" data-act-sub="timeslot">
            <span class="t1">⏱ تایم اسلاتی</span><span class="t2">۲۸ خرداد و ۳۱ اردیبهشت</span>
          </button>
        </div>
        ${sub === 'daily' ? renderDailyTable(act.daily) : renderTimeslot(act.timeslot)}
      </div>`;
    }

    function actTable(rows, empty = false) {
      if (empty) return `<div class="empty-state">داده‌ای برای این بخش ثبت نشده است</div>`;
      const tCohort = rows.reduce((a, r) => a + (r.cohort || 0), 0);
      const tEnroll = rows.reduce((a, r) => a + (r.enroll || 0), 0);
      const tWinner = rows.reduce((a, r) => a + (r.winner || 0), 0);
      const tCost = sumCost(rows);
      return `
      <div class="tbl-scroll"><table class="data">
        <thead><tr><th>شهر</th><th>Cohort</th><th>Enroll</th><th>Winner</th><th>Cost</th><th>ROI</th></tr></thead>
        <tbody>
          ${pinSort(rows).map(r => `
            <tr class="${PINNED.includes(r.city) ? 'pinned-row' : ''}">
              <td class="city">${r.city}</td>
              <td>${cell(r.cohort)}</td><td>${cell(r.enroll)}</td>
              <td>${cell(r.winner)}</td><td>${cell(r.cost)}</td>
              <td>${fmtRoi(r.roi)}</td>
            </tr>`).join('')}
        </tbody>
        <tfoot><tr style="background:var(--panel-2)">
          <td class="city" style="font-weight:900">جمع کل</td>
          <td style="font-weight:800">${cell(tCohort)}</td>
          <td style="font-weight:800">${cell(tEnroll)}</td>
          <td style="font-weight:800">${cell(tWinner)}</td>
          <td style="font-weight:800">${cell(tCost)}</td>
          <td></td>
        </tr></tfoot>
      </table></div>`;
    }

    function renderDailyTable(daily) {
      return `
      <div style="border:2px solid rgba(124,58,237,.25);border-radius:var(--r-md);padding:20px;background:var(--purple-glow)">
        <div class="split-head">
          <span class="sw" style="background:var(--purple)"></span>
          روزانه — ۲۸ خرداد - Recency (1-30)
          <span class="tag" style="margin-right:auto">${toFa(daily.rows.length)} شهر</span>
        </div>
        ${actTable(daily.rows)}
      </div>`;
    }

    function renderTimeslot(timeslot) {
      const dates = Object.keys(timeslot);
      const cur = actSub.plusDate && timeslot[actSub.plusDate] ? actSub.plusDate : dates[0];
      actSub.plusDate = cur;
      const block = timeslot[cur];
      return `
      <div class="datebar">
        ${dates.map(d => `<button class="datebtn ${d === cur ? 'active' : ''}" data-actdate="${d}">${DATE_LABEL[d]}</button>`).join('')}
      </div>
      <div style="border:2px solid rgba(5,150,105,.25);border-radius:var(--r-md);padding:20px;background:var(--green-glow)">
        <div class="split-head"><span class="sw" style="background:var(--green)"></span>تایم اسلاتی — ${DATE_LABEL[cur]}</div>
        <div class="split-tables">
          <div>
            <div class="split-head" style="font-size:13px;color:var(--text-dim)">
              Active-Recency (1-7) <span class="tag">${toFa(block.active.length)} شهر</span>
            </div>
            ${actTable(block.active)}
          </div>
          <div>
            <div class="split-head" style="font-size:13px;color:var(--text-dim)">
              Recent Active-Recency (8-14)
              ${block.recent ? `<span class="tag">${toFa(block.recent.length)} شهر</span>` : ''}
            </div>
            ${block.recent ? actTable(block.recent) : actTable(null, true)}
          </div>
        </div>
      </div>`;
    }

    /* ── act alo ── */
    function renderActAlo() {
      const act = DATA.alo.act;
      const dates = Object.keys(act);
      const cur = act[actSub.aloDate] ? actSub.aloDate : dates[0];
      actSub.aloDate = cur;
      const rows = pinSort(act[cur].slice().sort((a, b) => b.cost - a.cost));
      const tCohort = rows.reduce((a, r) => a + (r.cohort || 0), 0);
      const tWinner = rows.reduce((a, r) => a + (r.winner || 0), 0);
      const tCost = sumCost(rows);
      return `
      <div class="panel">
        <div class="panel-head"><div><h3>نگهداشت سفیران — الوپیک</h3></div></div>
        <div class="datebar">
          ${dates.map(d => `<button class="datebtn ${d === cur ? 'active' : ''}" data-actdate-alo="${d}">${DATE_LABEL[d]}</button>`).join('')}
        </div>
        <div class="tbl-scroll"><table class="data">
          <thead><tr><th>شهر</th><th>Cohort</th><th>Winner</th><th>Cost</th><th>ROI</th></tr></thead>
          <tbody>
            ${rows.map(r => `
              <tr class="${PINNED.includes(r.city) ? 'pinned-row' : ''}">
                <td class="city">${r.city}</td>
                <td>${cell(r.cohort)}</td><td>${cell(r.winner)}</td>
                <td>${cell(r.cost)}</td><td>${fmtRoi(r.roi)}</td>
              </tr>`).join('')}
          </tbody>
          <tfoot><tr style="background:var(--panel-2)">
            <td class="city" style="font-weight:900">جمع کل</td>
            <td style="font-weight:800">${cell(tCohort)}</td>
            <td style="font-weight:800">${cell(tWinner)}</td>
            <td style="font-weight:800">${cell(tCost)}</td>
            <td></td>
          </tr></tfoot>
        </table></div>
      </div>`;
    }

    /* ── handlers ── */
    function attachHandlers() {
      const root = document.getElementById('content');
      root.querySelectorAll('[data-react-date]').forEach(b => b.onclick = () => { reactDate[state.company] = b.dataset.reactDate; renderBody(); });
      root.querySelectorAll('[data-seg-toggle]').forEach(b => b.onclick = () => { openSeg[b.dataset.segToggle] = !openSeg[b.dataset.segToggle]; renderBody(); });
      root.querySelectorAll('[data-act-sub]').forEach(b => b.onclick = () => { actSub.plus = b.dataset.actSub; renderBody(); });
      root.querySelectorAll('[data-actdate]').forEach(b => b.onclick = () => { actSub.plusDate = b.dataset.actdate; renderBody(); });
      root.querySelectorAll('[data-actdate-alo]').forEach(b => b.onclick = () => { actSub.aloDate = b.dataset.actdateAlo; renderBody(); });
    }

    document.getElementById('btnAlo').onclick = () => { state.company = 'alo'; renderShell(); };
    document.getElementById('btnPlus').onclick = () => { state.company = 'plus'; renderShell(); };
    renderShell();
  </script>
</body>

</html>
